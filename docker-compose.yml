services:
  qwen2api:
    image: softs2005/qwen2api:latest
    container_name: qwen2api
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - "7860:7860"
    volumes:
      - ./data:/workspace/data
      - ./logs:/workspace/logs
    dns:
      - ${DOCKER_DNS_1:-223.5.5.5}
      - ${DOCKER_DNS_2:-119.29.29.29}
    shm_size: "256m"
    environment:
      PYTHONIOENCODING: utf-8
      PORT: "7860"
      WORKERS: "1"
      LOG_LEVEL: "INFO"
      DIAGNOSTIC_STACK_DUMP_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl --max-time 5 -fsS http://localhost:7860/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
